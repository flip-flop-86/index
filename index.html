<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>کامیون‌سواری سه‌بعدی | Truck Driver 3D</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; overflow: hidden; font-family: 'Segoe UI', Tahoma, sans-serif; user-select: none; }
        canvas { display: block; }
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        #hud { position: absolute; top: 20px; left: 20px; right: 20px; display: flex; justify-content: space-between; }
        .hud-panel { background: rgba(0,0,0,0.75); border: 1px solid rgba(255,255,255,0.15); border-radius: 15px; padding: 15px 20px; color: white; }
        .hud-label { font-size: 10px; letter-spacing: 2px; color: #888; }
        .hud-value { font-size: 28px; font-weight: 900; color: #00ff88; }
        .hud-value.danger { color: #ff4444; }
        #speedometer { position: absolute; bottom: 30px; right: 30px; width: 140px; height: 140px; background: rgba(0,0,0,0.75); border: 2px solid rgba(255,255,255,0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        #speedValue { font-size: 48px; font-weight: 900; color: #fff; line-height: 1; }
        #speedUnit { font-size: 12px; color: #888; }
        #speedBar { position: absolute; bottom: -5px; width: 100px; height: 3px; background: rgba(255,255,255,0.1); border-radius: 2px; }
        #speedFill { height: 100%; background: #00ff88; border-radius: 2px; transition: width 0.1s; }
        #notification { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); font-size: 24px; font-weight: 900; color: #ffd700; text-shadow: 0 0 20px #ffd700; opacity: 0; transition: all 0.3s; }
        #notification.show { opacity: 1; }
        #controls-hint { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); color: rgba(255,255,255,0.4); font-size: 11px; display: flex; gap: 12px; }
        .key-hint { background: rgba(255,255,255,0.08); padding: 5px 10px; border-radius: 5px; }
        #startScreen, #gameOverScreen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.92); display: flex; align-items: center; justify-content: center; flex-direction: column; z-index: 100; pointer-events: all; }
        #gameOverScreen { display: none; }
        #startScreen h1 { font-size: 60px; font-weight: 900; background: linear-gradient(135deg, #00ff88, #00ccff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 10px; }
        #startScreen .subtitle { color: #aaa; font-size: 16px; margin-bottom: 40px; letter-spacing: 3px; }
        #startBtn, #restartBtn { padding: 18px 50px; font-size: 22px; font-weight: 700; background: #00ff88; border: none; border-radius: 50px; color: #000; cursor: pointer; pointer-events: all; transition: all 0.3s; letter-spacing: 1px; }
        #startBtn:hover, #restartBtn:hover { transform: scale(1.08); box-shadow: 0 0 40px rgba(0,255,136,0.5); }
        #gameOverScreen h2 { font-size: 50px; color: #ff4444; margin-bottom: 15px; }
        #gameOverScreen .final-score { font-size: 36px; color: #fff; margin-bottom: 30px; }
        @media (max-width: 768px) { #startScreen h1 { font-size: 36px; } #speedometer { width: 110px; height: 110px; bottom: 20px; right: 20px; } #speedValue { font-size: 36px; } .hud-panel { padding: 10px 14px; } .hud-value { font-size: 22px; } }
    </style>
</head>
<body>
    <div id="ui">
        <div id="hud">
            <div class="hud-panel"><div class="hud-label">🏁 مسافت</div><div class="hud-value" id="distance">0<span style="font-size:14px;">m</span></div></div>
            <div class="hud-panel"><div class="hud-label">⭐ امتیاز</div><div class="hud-value" id="score">0</div></div>
            <div class="hud-panel"><div class="hud-label">🪙 سکه</div><div class="hud-value" id="coins">0</div></div>
            <div class="hud-panel"><div class="hud-label">💥 آسیب</div><div class="hud-value danger" id="damage">0%</div></div>
        </div>
        <div id="speedometer">
            <div id="speedValue">0</div><div id="speedUnit">KM/H</div>
            <div id="speedBar"><div id="speedFill" style="width:0%"></div></div>
        </div>
        <div id="notification"></div>
        <div id="controls-hint">
            <span class="key-hint">W/↑ گاز</span><span class="key-hint">S/↓ ترمز</span>
            <span class="key-hint">A/← چپ</span><span class="key-hint">D/→ راست</span>
            <span class="key-hint">Space ترمز دستی</span>
        </div>
        <div id="startScreen">
            <h1>🚛 کامیون‌سواری</h1>
            <div class="subtitle">TRUCK DRIVER 3D</div>
            <button id="startBtn">▶ شروع بازی</button>
        </div>
        <div id="gameOverScreen">
            <h2>💥 تصادف!</h2>
            <div class="final-score" id="finalScore">امتیاز: 0</div>
            <button id="restartBtn">🔄 بازی دوباره</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js">
    </script>
    <script>
        // ==================== متغیرها ====================
        let scene, camera, renderer, clock;
        let truck, wheels = [],
            trailer, trailerWheels = [];
        let roadPieces = [],
            trees = [],
            buildings = [],
            coins = [],
            otherCars = [];
        let particles = [];
        let speed = 0,
            maxSpeed = 180;
        let steerAngle = 0;
        let distance = 0,
            score = 0,
            coinCount = 0,
            damage = 0;
        let gameRunning = false;
        let keys = {};
        let roadCurve = 0;
        let time = 0;

        // ==================== شروع ====================
        function init() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x1a1a2e, 0.00015);

            camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 1, 1000);
            camera.position.set(0, 8, -15);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            // نور
            scene.add(new THREE.AmbientLight(0x445566, 1.5));
            const sun = new THREE.DirectionalLight(0xffeedd, 3);
            sun.position.set(50, 80, 20);
            sun.castShadow = true;
            sun.shadow.mapSize.width = 2048;
            sun.shadow.mapSize.height = 2048;
            sun.shadow.camera.near = 1;
            sun.shadow.camera.far = 200;
            sun.shadow.camera.left = -60;
            sun.shadow.camera.right = 60;
            sun.shadow.camera.top = 60;
            sun.shadow.camera.bottom = -60;
            scene.add(sun);

            // زمین
            const groundGeo = new THREE.PlaneGeometry(500, 500);
            const groundMat = new THREE.MeshStandardMaterial({ color: 0x2d5a27, roughness: 0.9 });
            const ground = new THREE.Mesh(groundGeo, groundMat);
            ground.rotation.x = -Math.PI / 2;
            ground.position.y = -0.5;
            ground.receiveShadow = true;
            scene.add(ground);

            // ساخت کامیون
            buildTruck();
            // ساخت جاده
            for (let i = -20; i < 100; i++) createRoadPiece(i * 20);
            // ساخت محیط
            for (let i = -10; i < 50; i++) createEnvironment(i * 15);

            // رویدادها
            window.addEventListener('keydown', e => {
                keys[e.key.toLowerCase()] = true;
                if (e.key === ' ') { e.preventDefault();
                    handbrake(); }
            });
            window.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            // دکمه‌ها
            document.getElementById('startBtn').addEventListener('click', startGame);
            document.getElementById('restartBtn').addEventListener('click', startGame);

            clock = new THREE.Clock();
            animate();
        }

        function buildTruck() {
            truck = new THREE.Group();
            const mat = new THREE.MeshStandardMaterial({ color: 0x2255cc, roughness: 0.3, metalness: 0.7 });
            const chassis = new THREE.Mesh(new THREE.BoxGeometry(3, 0.4, 6), mat);
            chassis.position.y = 1.2;
            chassis.castShadow = true;
            truck.add(chassis);
            const cabin = new THREE.Mesh(new THREE.BoxGeometry(2.8, 1.8, 2.2), mat);
            cabin.position.set(0, 2.3, 1.2);
            cabin.castShadow = true;
            truck.add(cabin);
            const whGeo = new THREE.CylinderGeometry(0.6, 0.6, 0.5, 16);
            const whMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.8 });
            for (let i = -1; i <= 1; i += 2) {
                const w = new THREE.Mesh(whGeo, whMat);
                w.rotation.z = Math.PI / 2;
                w.position.set(i * 1.5, 0.6, 1.8);
                w.castShadow = true;
                truck.add(w);
                wheels.push({ mesh: w, isFront: true });
            }
            for (let i = -1; i <= 1; i += 2) {
                for (let j = -0.4; j <= 0.4; j += 0.8) {
                    const w = new THREE.Mesh(whGeo, whMat);
                    w.rotation.z = Math.PI / 2;
                    w.position.set(i * 1.5, 0.6, -1.8 + j);
                    w.castShadow = true;
                    truck.add(w);
                    wheels.push({ mesh: w, isFront: false });
                }
            }
            // تریلر
            trailer = new THREE.Group();
            const tMat = new THREE.MeshStandardMaterial({ color: 0xcccccc, roughness: 0.4, metalness: 0.5 });
            const tBody = new THREE.Mesh(new THREE.BoxGeometry(2.8, 0.4, 7), tMat);
            tBody.position.y = 1.4;
            tBody.castShadow = true;
            trailer.add(tBody);
            for (let s = -1; s <= 1; s += 2) {
                const wall = new THREE.Mesh(new THREE.BoxGeometry(0.2, 1.5, 7), tMat);
                wall.position.set(s * 1.4, 2.3, 0);
                wall.castShadow = true;
                trailer.add(wall);
            }
            trailer.add(new THREE.Mesh(new THREE.BoxGeometry(2.8, 0.15, 7), tMat)).position.y = 3.1;
            for (let i = -1; i <= 1; i += 2) {
                for (let j = -1.5; j <= 1.5; j += 3) {
                    const w = new THREE.Mesh(whGeo, whMat);
                    w.rotation.z = Math.PI / 2;
                    w.position.set(i * 1.5, 0.6, j);
                    w.castShadow = true;
                    trailer.add(w);
                    trailerWheels.push(w);
                }
            }
            trailer.position.set(0, 0, -7);
            scene.add(trailer);
            scene.add(truck);
        }

        function createRoadPiece(z) {
            const road = new THREE.Mesh(new THREE.PlaneGeometry(8, 20), new THREE.MeshStandardMaterial({ color: 0x333333,
                roughness: 0.9 }));
            road.rotation.x = -Math.PI / 2;
            road.position.set(0, 0.02, z);
            road.receiveShadow = true;
            scene.add(road);
            roadPieces.push({ mesh: road, z: z });
            for (let x = -2; x <= 2; x += 4) {
                const line = new THREE.Mesh(new THREE.PlaneGeometry(0.15, 3), new THREE.MeshBasicMaterial({ color: 0xffffff }));
                line.rotation.x = -Math.PI / 2;
                line.position.set(x, 0.03, z);
                scene.add(line);
            }
        }

        function createEnvironment(z) {
            if (Math.random() > 0.3) {
                const tree = new THREE.Group();
                const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.4, 5, 8), new THREE
            .MeshStandardMaterial({ color: 0x8B4513 }));
                trunk.position.y = 2.5;
                trunk.castShadow = true;
                tree.add(trunk);
                for (let i = 0; i < 3; i++) {
                    const f = new THREE.Mesh(new THREE.ConeGeometry(1.5 - i * 0.3, 2, 8), new THREE
                        .MeshStandardMaterial({ color: 0x226622, roughness: 0.8 }));
                    f.position.y = 4.5 + i * 1.5;
                    f.castShadow = true;
                    tree.add(f);
                }
                tree.position.set((Math.random() > 0.5 ? 1 : -1) * (8 + Math.random() * 20), 0, z + Math.random() * 10);
                tree.scale.setScalar(0.8 + Math.random() * 0.8);
                scene.add(tree);
                trees.push(tree);
            }
            if (Math.random() > 0.6) {
                const side = Math.random() > 0.5 ? 1 : -1;
                const h = 5 + Math.random() * 20;
                const bld = new THREE.Mesh(new THREE.BoxGeometry(3 + Math.random() * 6, h, 3 + Math.random() * 6), new THREE
                    .MeshStandardMaterial({ color: 0x888899, roughness: 0.7 }));
                bld.position.y = h / 2;
                bld.position.set(side * (12 + Math.random() * 25), 0, z + Math.random() * 15);
                bld.castShadow = true;
                bld.receiveShadow = true;
                scene.add(bld);
                buildings.push(bld);
            }
            if (Math.random() > 0.6) {
                const coin = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.5, 0.15, 16), new THREE
            .MeshStandardMaterial({ color: 0xffd700, roughness: 0.2, metalness: 0.9, emissive: 0xffd700,
                    emissiveIntensity: 0.4 }));
                coin.position.set((Math.random() - 0.5) * 6, 1.5, z + Math.random() * 15);
                coin.rotation.x = Math.PI / 2;
                coin.userData = { collected: false, baseY: coin.position.y };
                scene.add(coin);
                coins.push(coin);
            }
            if (Math.random() > 0.85) {
                const car = new THREE.Group();
                const cMat = new THREE.MeshStandardMaterial({ color: Math.random() * 0xffffff, roughness: 0.3,
                    metalness: 0.6 });
                car.add(new THREE.Mesh(new THREE.BoxGeometry(2, 0.8, 3.5), cMat)).position.y = 0.8;
                car.add(new THREE.Mesh(new THREE.BoxGeometry(1.8, 0.6, 1.5), cMat)).position.set(0, 1.5, 0.3);
                const lane = Math.random() > 0.5 ? 2.5 : -2.5;
                car.position.set(lane, 0, z + Math.random() * 20);
                car.userData = { speed: 0.3 + Math.random() * 0.5, lane: lane };
                scene.add(car);
                otherCars.push(car);
            }
        }

        function createExhaust() {
            const p = new THREE.Mesh(new THREE.SphereGeometry(0.08, 4, 4), new THREE.MeshBasicMaterial({ color: 0x888888,
                transparent: true, opacity: 0.6 }));
            p.position.copy(truck.position);
            p.position.y += 0.8;
            p.position.z -= 2.5;
            p.userData = { life: 1 };
            scene.add(p);
            particles.push(p);
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = Math.min(clock.getDelta(), 0.1);
            time += delta;
            if (gameRunning) updateGame(delta);
            updateCamera();
            renderer.render(scene, camera);
        }

        function updateGame(delta) {
            if (keys['w'] || keys['arrowup']) speed = Math.min(speed + 1, maxSpeed);
            else if (keys['s'] || keys['arrowdown']) speed = Math.max(speed - 2, 0);
            else speed = Math.max(speed - 0.4, 0);
            if (keys['a'] || keys['arrowleft']) steerAngle = Math.max(steerAngle - 0.06, -0.5);
            else if (keys['d'] || keys['arrowright']) steerAngle = Math.min(steerAngle + 0.06, 0.5);
            else steerAngle *= 0.88;

            const moveZ = speed * delta * 0.15;
            truck.position.z += moveZ;
            truck.position.x += steerAngle * speed * delta * 0.03;
            truck.rotation.y = steerAngle * 0.4;

            const target = new THREE.Vector3(truck.position.x, truck.position.y, truck.position.z - 7);
            trailer.position.lerp(target, 0.1);
            trailer.rotation.y = THREE.MathUtils.lerp(trailer.rotation.y, truck.rotation.y, 0.08);

            wheels.forEach(w => { w.mesh.rotation.x += speed * delta * 0.2; });
            trailerWheels.forEach(w => { w.rotation.x += speed * delta * 0.2; });

            distance += speed * delta;
            score = Math.floor(distance * 0.1) + coinCount * 100;

            if (speed > 50 && Math.random() > 0.5) createExhaust();
            particles.forEach((p, i) => {
                p.userData.life -= delta * 2;
                p.material.opacity = p.userData.life * 0.6;
                p.position.y += 0.02;
                p.position.z -= 0.15;
                if (p.userData.life <= 0) { scene.remove(p);
                    particles.splice(i, 1); }
            });

            roadPieces.forEach(r => { if (r.z - truck.position.z < -30) { r.z += 2000;
                    r.mesh.position.z = r.z; } });
            [...trees, ...buildings].forEach(o => { if (o.position.z - truck.position.z < -30) o.position.z += 750; });

            coins.forEach(c => {
                c.rotation.z += delta * 3;
                c.position.y = c.userData.baseY + Math.sin(time * 5 + c.position.x) * 0.3;
                if (!c.userData.collected && truck.position.distanceTo(c.position) < 3) {
                    c.userData.collected = true;
                    coinCount++;
                    c.visible = false;
                    showNotif('🪙 +1');
                }
            });

            otherCars.forEach(car => {
                car.position.z -= car.userData.speed * delta * 8;
                if (car.position.z - truck.position.z < -30) car.position.z += 400;
                if (truck.position.distanceTo(car.position) < 2.5 && speed > 0) {
                    damage += delta * 25;
                    speed *= 0.75;
                    showNotif('💥');
                    if (damage >= 100) gameOver();
                }
            });

            updateUI();
        }

        function handbrake() { if (gameRunning) { speed = Math.max(speed - 50, 0);
                showNotif('🛑'); } }

        function updateUI() {
            document.getElementById('speedValue').textContent = Math.floor(speed);
            document.getElementById('speedFill').style.width = (speed / maxSpeed * 100) + '%';
            document.getElementById('distance').innerHTML = Math.floor(distance) +
                '<span style="font-size:14px;">m</span>';
            document.getElementById('score').textContent = score;
            document.getElementById('coins').textContent = coinCount;
            document.getElementById('damage').textContent = Math.floor(damage) + '%';
        }

        function updateCamera() {
            const tp = truck.position;
            camera.position.lerp(new THREE.Vector3(tp.x, tp.y + 6, tp.z - 14), 0.05);
            camera.lookAt(tp.x, tp.y + 2, tp.z + 5);
        }

        function showNotif(msg) {
            const n = document.getElementById('notification');
            n.textContent = msg;
            n.classList.add('show');
            setTimeout(() => n.classList.remove('show'), 1000);
        }

        function gameOver() {
            gameRunning = false;
            document.getElementById('gameOverScreen').style.display = 'flex';
            document.getElementById('finalScore').textContent = 'امتیاز نهایی: ' + score;
            document.body.style.cursor = 'default';
        }

        function startGame() {
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('gameOverScreen').style.display = 'none';
            document.body.style.cursor = 'none';
            speed = 0;
            distance = 0;
            score = 0;
            coinCount = 0;
            damage = 0;
            truck.position.set(0, 0, 0);
            truck.rotation.set(0, 0, 0);
            trailer.position.set(0, 0, -7);
            trailer.rotation.set(0, 0, 0);
            coins.forEach(c => { c.userData.collected = false;
                c.visible = true; });
            gameRunning = true;
        }

        init();
        console.log('🚛 آماده! دکمه شروع رو بزن.');
    </script>
</body>
</html>
