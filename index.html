<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>چت با GPT</title>

<style>
body{
    font-family:Tahoma;
    background:#111827;
    color:white;
    max-width:800px;
    margin:auto;
    padding:20px;
}

h2{
    text-align:center;
}

textarea{
    width:100%;
    height:120px;
    padding:10px;
    font-size:18px;
    border-radius:10px;
}

button{
    margin-top:10px;
    width:100%;
    padding:12px;
    font-size:18px;
    cursor:pointer;
    border:none;
    border-radius:10px;
    background:#10a37f;
    color:white;
}

#result{
    margin-top:20px;
    padding:15px;
    background:#1f2937;
    border-radius:10px;
    white-space:pre-wrap;
}
</style>

</head>
<body>

<h2>🤖 چت با GPT</h2>

<textarea id="prompt" placeholder="پیام خود را بنویس..."></textarea>

<button onclick="askGPT()">ارسال</button>

<div id="result"></div>

<script>

const API_KEY = "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";

async function askGPT(){

const prompt = document.getElementById("prompt").value;

document.getElementById("result").innerHTML = "در حال دریافت پاسخ...";

try{

const response = await fetch("https://api.openai.com/v1/responses",{

method:"POST",

headers:{
"Content-Type":"application/json",
"Authorization":"Bearer " + API_KEY
},

body:JSON.stringify({

model:"gpt-4.1-mini",

input:prompt

})

});

const data = await response.json();

document.getElementById("result").innerHTML =
data.output[0].content[0].text;

}catch(e){

document.getElementById("result").innerHTML =
"خطا در اتصال";

console.log(e);

}

}

</script>

</body>
</html>
