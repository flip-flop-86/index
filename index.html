<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>کامیون‌سواری سه‌بعدی | Truck Driver 3D</title>
    <style>
        :root {
            --neon: #00ff88;
            --neon2: #ff6b35;
            --dark: #0a0a0a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            user-select: none;
            -webkit-user-select: none;
            cursor: none;
        }

        canvas {
            display: block;
        }

        #ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        #hud {
            position: absolute;
            top: 30px;
            left: 30px;
            right: 30px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .hud-panel {
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 18px;
            padding: 18px 24px;
            color: white;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        .hud-item {
            margin-bottom: 10px;
        }

        .hud-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #888;
            margin-bottom: 4px;
        }

        .hud-value {
            font-size: 32px;
            font-weight: 900;
            background: linear-gradient(135deg, var(--neon), #00ccff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hud-value.danger {
            background: linear-gradient(135deg, var(--neon2), #ff4444);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        #speedometer {
            position: absolute;
            bottom: 40px;
            right: 40px;
            width: 160px;
            height: 160px;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(15px);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            box-shadow: 0 0 60px rgba(0, 255, 136, 0.15);
        }

        #speedValue {
            font-size: 52px;
            font-weight: 900;
            background: linear-gradient(180deg, #fff, #ccc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1;
        }

        #speedUnit {
            font-size: 14px;
            color: #888;
            letter-spacing: 3px;
        }

        #speedBar {
            position: absolute;
            bottom: -8px;
            width: 120px;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            overflow: hidden;
        }

        #speedFill {
            height: 100%;
            background: var(--neon);
            transition: width 0.1s;
            border-radius: 2px;
            box-shadow: 0 0 10px var(--neon);
        }

        #minimap {
            position: absolute;
            bottom: 40px;
            left: 40px;
            width: 180px;
            height: 180px;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(15px);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 18px;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        #minimapCanvas {
            width: 100%;
            height: 100%;
        }

        #notification {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 28px;
            font-weight: 900;
            color: var(--neon);
            text-align: center;
            text-shadow: 0 0 30px var(--neon);
            opacity: 0;
            transition: all 0.5s;
        }

        #notification.show {
            opacity: 1;
            animation: popIn 0.5s ease, fadeOut 0.5s 2s ease forwards;
        }

        @keyframes popIn {
            0% {
                transform: translate(-50%, -50%) scale(0);
            }
            100% {
                transform: translate(-50%, -50%) scale(1);
            }
        }

        @keyframes fadeOut {
            to {
                opacity: 0;
                transform: translate(-50%, -60%);
            }
        }

        #controls-hint {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.5);
            font-size: 13px;
            letter-spacing: 1px;
            display: flex;
            gap: 20px;
        }

        .key-hint {
            background: rgba(255, 255, 255, 0.1);
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 11px;
        }

        #startScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            z-index: 100;
            pointer-events: all;
        }

        #startScreen h1 {
            font-size: 72px;
            font-weight: 900;
            background: linear-gradient(135deg, var(--neon), #00ccff, var(--neon2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
            animation: glow 2s infinite;
            text-align: center;
        }

        @keyframes glow {
            0%,
            100% {
                filter: brightness(1);
            }
            50% {
                filter: brightness(1.4);
            }
        }

        #startScreen .subtitle {
            color: #aaa;
            font-size: 20px;
            margin-bottom: 50px;
            letter-spacing: 3px;
        }

        #startBtn {
            padding: 20px 60px;
            font-size: 28px;
            font-weight: 900;
            background: linear-gradient(135deg, var(--neon), #00cc66);
            border: none;
            border-radius: 60px;
            color: #000;
            cursor: pointer;
            pointer-events: all;
            transition: all 0.3s;
            letter-spacing: 2px;
            box-shadow: 0 0 60px rgba(0, 255, 136, 0.4);
        }

        #startBtn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 100px rgba(0, 255, 136, 0.7);
        }

        #gameOverScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            z-index: 100;
            pointer-events: all;
        }

        #gameOverScreen h2 {
            font-size: 64px;
            font-weight: 900;
            color: var(--neon2);
            margin-bottom: 20px;
        }

        #gameOverScreen .final-score {
            font-size: 48px;
            color: white;
            margin-bottom: 40px;
        }

        #restartBtn {
            padding: 15px 50px;
            font-size: 22px;
            font-weight: 700;
            background: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            pointer-events: all;
            transition: all 0.3s;
        }

        #restartBtn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 50px rgba(255, 255, 255, 0.5);
        }

        @media (max-width: 768px) {
            #startScreen h1 {
                font-size: 40px;
            }
            #speedometer {
                width: 120px;
                height: 120px;
                bottom: 20px;
                right: 20px;
            }
            #speedValue {
                font-size: 38px;
            }
            #minimap {
                width: 120px;
                height: 120px;
                bottom: 20px;
                left: 20px;
            }
            .hud-panel {
                padding: 12px 16px;
            }
            .hud-value {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div id="ui">
        <div id="hud">
            <div class="hud-panel">
                <div class="hud-item">
                    <div class="hud-label">🏁 مسافت</div>
                    <div class="hud-value" id="distance">0<span style="font-size:18px;">m</span></div>
                </div>
                <div class="hud-item">
                    <div class="hud-label">⭐ امتیاز</div>
                    <div class="hud-value" id="score">0</div>
                </div>
            </div>
            <div class="hud-panel">
                <div class="hud-item">
                    <div class="hud-label">🪙 سکه</div>
                    <div class="hud-value" id="coins">0</div>
                </div>
                <div class="hud-item">
                    <div class="hud-label">💥 آسیب</div>
                    <div class="hud-value danger" id="damage">0%</div>
                </div>
            </div>
        </div>
        <div id="speedometer">
            <div id="speedValue">0</div>
            <div id="speedUnit">KM/H</div>
            <div id="speedBar"><div id="speedFill" style="width:0%"></div></div>
        </div>
        <div id="minimap">
            <canvas id="minimapCanvas" width="180" height="180"></canvas>
        </div>
        <div id="notification"></div>
        <div id="controls-hint">
            <span class="key-hint">W/↑ گاز</span>
            <span class="key-hint">S/↓ ترمز</span>
            <span class="key-hint">A/← چپ</span>
            <span class="key-hint">D/→ راست</span>
            <span class="key-hint">Space ترمز دستی</span>
        </div>
        <div id="startScreen">
            <h1>🚛 کامیون‌سواری</h1>
            <div class="subtitle">TRUCK DRIVER 3D</div>
            <button id="startBtn" onclick="startGame()">▶ شروع بازی</button>
        </div>
        <div id="gameOverScreen">
            <h2>💥 تصادف!</h2>
            <div class="final-score" id="finalScore">امتیاز: 0</div>
            <button id="restartBtn" onclick="restartGame()">🔄 بازی دوباره</button>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.157.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.157.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // ==================== متغیرهای بازی ====================
        let scene, camera, renderer, clock;
        let truck, wheels = [],
            trailer, trailerWheels = [];
        let roadPieces = [],
            trees = [],
            buildings = [],
            coins = [],
            otherCars = [];
        let roadMarkings = [];
        let skyColor, sunLight, ambientLight;
        let particles = [];
        let speed = 0,
            maxSpeed = 180;
        let steerAngle = 0;
        let distance = 0,
            score = 0,
            coinCount = 0,
            damage = 0;
        let gameRunning = false;
        let keys = {};
        let roadCurve = 0;
        let time = 0;
        let minimapCtx;

        // ==================== مقداردهی اولیه ====================
        function init() {
            // صحنه
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x1a1a2e, 0.00015);

            // دوربین
            camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 1, 1000);
            camera.position.set(0, 8, -15);
            camera.lookAt(0, 2, 10);

            // رندرر
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.2;
            document.body.appendChild(renderer.domElement);

            // نور
            ambientLight = new THREE.AmbientLight(0x334455, 1.5);
            scene.add(ambientLight);

            sunLight = new THREE.DirectionalLight(0xffeedd, 4);
            sunLight.position.set(50, 80, 20);
            sunLight.castShadow = true;
            sunLight.shadow.mapSize.width = 2048;
            sunLight.shadow.mapSize.height = 2048;
            sunLight.shadow.camera.near = 1;
            sunLight.shadow.camera.far = 200;
            sunLight.shadow.camera.left = -60;
            sunLight.shadow.camera.right = 60;
            sunLight.shadow.camera.top = 60;
            sunLight.shadow.camera.bottom = -60;
            sunLight.shadow.bias = -0.0001;
            scene.add(sunLight);

            // آسمان
            const skyGeo = new THREE.SphereGeometry(400, 32, 32);
            const skyMat = new THREE.ShaderMaterial({
                uniforms: {
                    topColor: { value: new THREE.Color(0x0077ff) },
                    bottomColor: { value: new THREE.Color(0x88bbff) },
                    offset: { value: 20 },
                    exponent: { value: 0.6 }
                },
                vertexShader: `
                    varying vec3 vWorldPosition;
                    void main() {
                        vec4 worldPosition = modelMatrix * vec4(position, 1.0);
                        vWorldPosition = worldPosition.xyz;
                        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                    }
                `,
                fragmentShader: `
                    uniform vec3 topColor;
                    uniform vec3 bottomColor;
                    uniform float offset;
                    uniform float exponent;
                    varying vec3 vWorldPosition;
                    void main() {
                        float h = normalize(vWorldPosition + offset).y;
                        gl_FragColor = vec4(mix(bottomColor, topColor, max(pow(max(h, 0.0), exponent), 0.0)), 1.0);
                    }
                `,
                side: THREE.BackSide
            });
            const sky = new THREE.Mesh(skyGeo, skyMat);
            scene.add(sky);

            // زمین
            const groundGeo = new THREE.PlaneGeometry(500, 500);
            const groundMat = new THREE.MeshStandardMaterial({
                color: 0x2d5a27,
                roughness: 0.9,
                metalness: 0.0
            });
            const ground = new THREE.Mesh(groundGeo, groundMat);
            ground.rotation.x = -Math.PI / 2;
            ground.position.y = -0.5;
            ground.receiveShadow = true;
            scene.add(ground);

            // ساخت کامیون
            buildTruck();

            // ساخت جاده
            for (let i = -20; i < 100; i++) {
                createRoadPiece(i * 20);
            }

            // ساخت محیط
            for (let i = -10; i < 50; i++) {
                createEnvironmentAt(i * 15);
            }

            // مینی‌مپ
            const minimapCanvas = document.getElementById('minimapCanvas');
            minimapCtx = minimapCanvas.getContext('2d');

            // کلیدها
            window.addEventListener('keydown', e => {
                keys[e.key.toLowerCase()] = true;
                if (e.key === ' ') {
                    e.preventDefault();
                    handbrake();
                }
            });
            window.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });
            window.addEventListener('resize', onResize);

            clock = new THREE.Clock();
            animate();
        }

        // ==================== ساخت کامیون ====================
        function buildTruck() {
            truck = new THREE.Group();

            // شاسی
            const chassisGeo = new THREE.BoxGeometry(3, 0.4, 6);
            const chassisMat = new THREE.MeshStandardMaterial({ color: 0x2255cc, roughness: 0.3, metalness: 0.7 });
            const chassis = new THREE.Mesh(chassisGeo, chassisMat);
            chassis.position.y = 1.2;
            chassis.castShadow = true;
            chassis.receiveShadow = true;
            truck.add(chassis);

            // کابین
            const cabinGeo = new THREE.BoxGeometry(2.8, 1.8, 2.2);
            const cabinMat = new THREE.MeshStandardMaterial({ color: 0x3366dd, roughness: 0.25, metalness: 0.6 });
            const cabin = new THREE.Mesh(cabinGeo, cabinMat);
            cabin.position.set(0, 2.3, 1.2);
            cabin.castShadow = true;
            cabin.receiveShadow = true;
            truck.add(cabin);

            // شیشه جلو
            const windshieldGeo = new THREE.PlaneGeometry(2.2, 1.2);
            const windshieldMat = new THREE.MeshStandardMaterial({
                color: 0x88ccff,
                roughness: 0.1,
                metalness: 0.3,
                opacity: 0.6,
                transparent: true
            });
            const windshield = new THREE.Mesh(windshieldGeo, windshieldMat);
            windshield.position.set(0, 2.8, 2.31);
            windshield.rotation.x = -0.2;
            truck.add(windshield);

            // چراغ‌ها
            const headlightGeo = new THREE.SphereGeometry(0.3, 16, 16);
            const headlightMat = new THREE.MeshStandardMaterial({ color: 0xffffaa, emissive: 0xffffaa, emissiveIntensity: 2,
                roughness: 0.1 });
            const leftLight = new THREE.Mesh(headlightGeo, headlightMat);
            leftLight.position.set(0.9, 1.8, 3);
            truck.add(leftLight);
            const rightLight = new THREE.Mesh(headlightGeo, headlightMat);
            rightLight.position.set(-0.9, 1.8, 3);
            truck.add(rightLight);

            // چراغ‌های عقب
            const taillightGeo = new THREE.BoxGeometry(0.3, 0.3, 0.15);
            const taillightMat = new THREE.MeshStandardMaterial({ color: 0xff0000, emissive: 0xff0000,
            emissiveIntensity: 1.5 });
            const leftTail = new THREE.Mesh(taillightGeo, taillightMat);
            leftTail.position.set(0.9, 1.5, -3);
            truck.add(leftTail);
            const rightTail = new THREE.Mesh(taillightGeo, taillightMat);
            rightTail.position.set(-0.9, 1.5, -3);
            truck.add(rightTail);

            // لوله اگزوز
            const exhaustGeo = new THREE.CylinderGeometry(0.15, 0.15, 2, 8);
            const exhaustMat = new THREE.MeshStandardMaterial({ color: 0x444444, roughness: 0.5, metalness: 0.9 });
            const exhaust = new THREE.Mesh(exhaustGeo, exhaustMat);
            exhaust.position.set(1.2, 0.8, -2.5);
            exhaust.rotation.x = Math.PI / 2;
            truck.add(exhaust);

            // چرخ‌های جلو
            const wheelGeo = new THREE.CylinderGeometry(0.6, 0.6, 0.5, 24);
            const wheelMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.8 });
            for (let i = -1; i <= 1; i += 2) {
                const wheel = new THREE.Mesh(wheelGeo, wheelMat);
                wheel.rotation.z = Math.PI / 2;
                wheel.position.set(i * 1.5, 0.6, 1.8);
                wheel.castShadow = true;
                truck.add(wheel);
                wheels.push({ mesh: wheel, isFront: true, side: i });
            }

            // چرخ‌های عقب (دوتایی)
            for (let i = -1; i <= 1; i += 2) {
                for (let j = -0.4; j <= 0.4; j += 0.8) {
                    const wheel = new THREE.Mesh(wheelGeo, wheelMat);
                    wheel.rotation.z = Math.PI / 2;
                    wheel.position.set(i * 1.5, 0.6, -1.8 + j);
                    wheel.castShadow = true;
                    truck.add(wheel);
                    wheels.push({ mesh: wheel, isFront: false, side: i });
                }
            }

            // تریلر
            trailer = new THREE.Group();
            const trailerBodyGeo = new THREE.BoxGeometry(2.8, 0.4, 7);
            const trailerBodyMat = new THREE.MeshStandardMaterial({ color: 0xdddddd, roughness: 0.4, metalness: 0.5 });
            const trailerBody = new THREE.Mesh(trailerBodyGeo, trailerBodyMat);
            trailerBody.position.y = 1.4;
            trailerBody.castShadow = true;
            trailerBody.receiveShadow = true;
            trailer.add(trailerBody);

            // دیواره‌های تریلر
            for (let s = -1; s <= 1; s += 2) {
                const wallGeo = new THREE.BoxGeometry(0.2, 1.5, 7);
                const wall = new THREE.Mesh(wallGeo, trailerBodyMat);
                wall.position.set(s * 1.4, 2.3, 0);
                wall.castShadow = true;
                trailer.add(wall);
            }

            // سقف تریلر
            const roofGeo = new THREE.BoxGeometry(2.8, 0.15, 7);
            const roof = new THREE.Mesh(roofGeo, trailerBodyMat);
            roof.position.y = 3.1;
            roof.castShadow = true;
            trailer.add(roof);

            // چرخ‌های تریلر
            for (let i = -1; i <= 1; i += 2) {
                for (let j = -1.5; j <= 1.5; j += 3) {
                    const wheel = new THREE.Mesh(wheelGeo, wheelMat);
                    wheel.rotation.z = Math.PI / 2;
                    wheel.position.set(i * 1.5, 0.6, j);
                    wheel.castShadow = true;
                    trailer.add(wheel);
                    trailerWheels.push(wheel);
                }
            }

            trailer.position.set(0, 0, -7);
            scene.add(trailer);
            scene.add(truck);
        }

        // ==================== جاده و محیط ====================
        function createRoadPiece(z) {
            const roadGeo = new THREE.PlaneGeometry(8, 20);
            const roadMat = new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.9 });
            const road = new THREE.Mesh(roadGeo, roadMat);
            road.rotation.x = -Math.PI / 2;
            road.position.set(0, 0.02, z);
            road.receiveShadow = true;
            scene.add(road);
            roadPieces.push({ mesh: road, z: z });

            // خط کشی
            for (let x = -2; x <= 2; x += 4) {
                const lineGeo = new THREE.PlaneGeometry(0.15, 3);
                const lineMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
                const line = new THREE.Mesh(lineGeo, lineMat);
                line.rotation.x = -Math.PI / 2;
                line.position.set(x, 0.03, z);
                scene.add(line);
                roadMarkings.push({ mesh: line, z: z, x: x });
            }
        }

        function createEnvironmentAt(z) {
            // درخت
            if (Math.random() > 0.3) {
                const treeGroup = new THREE.Group();
                const trunkGeo = new THREE.CylinderGeometry(0.3, 0.4, 5, 8);
                const trunkMat = new THREE.MeshStandardMaterial({ color: 0x8B4513, roughness: 0.9 });
                const trunk = new THREE.Mesh(trunkGeo, trunkMat);
                trunk.position.y = 2.5;
                trunk.castShadow = true;
                treeGroup.add(trunk);

                for (let i = 0; i < 3; i++) {
                    const foliageGeo = new THREE.ConeGeometry(1.5 - i * 0.3, 2, 8);
                    const foliageMat = new THREE.MeshStandardMaterial({
                        color: new THREE.Color().setHSL(0.25 + Math.random() * 0.1, 0.8, 0.3 + Math
                    .random() * 0.2),
                        roughness: 0.8
                    });
                    const foliage = new THREE.Mesh(foliageGeo, foliageMat);
                    foliage.position.y = 4.5 + i * 1.5;
                    foliage.castShadow = true;
                    treeGroup.add(foliage);
                }

                treeGroup.position.set((Math.random() > 0.5 ? 1 : -1) * (8 + Math.random() * 20), 0, z + Math.random() *
                    10);
                treeGroup.scale.setScalar(0.8 + Math.random() * 0.8);
                scene.add(treeGroup);
                trees.push(treeGroup);
            }

            // ساختمان
            if (Math.random() > 0.5) {
                const side = Math.random() > 0.5 ? 1 : -1;
                const buildingGroup = new THREE.Group();
                const h = 5 + Math.random() * 25;
                const buildingGeo = new THREE.BoxGeometry(3 + Math.random() * 6, h, 3 + Math.random() * 6);
                const buildingMat = new THREE.MeshStandardMaterial({
                    color: new THREE.Color().setHSL(Math.random(), 0.1, 0.4 + Math.random() * 0.4),
                    roughness: 0.7
                });
                const building = new THREE.Mesh(buildingGeo, buildingMat);
                building.position.y = h / 2;
                building.castShadow = true;
                building.receiveShadow = true;
                buildingGroup.add(building);

                // پنجره‌ها
                for (let wy = 1; wy < h; wy += 2.5) {
                    for (let wx = -1; wx <= 1; wx += 2) {
                        const windowGeo = new THREE.PlaneGeometry(0.8, 1.2);
                        const windowMat = new THREE.MeshStandardMaterial({
                            color: 0xffff88,
                            emissive: 0xffff88,
                            emissiveIntensity: 0.5
                        });
                        const windowMesh = new THREE.Mesh(windowGeo, windowMat);
                        windowMesh.position.set(wx * 1.5, wy, 1.6);
                        buildingGroup.add(windowMesh);
                    }
                }

                buildingGroup.position.set(side * (12 + Math.random() * 25), 0, z + Math.random() * 15);
                scene.add(buildingGroup);
                buildings.push(buildingGroup);
            }

            // سکه
            if (Math.random() > 0.6) {
                const coinGeo = new THREE.CylinderGeometry(0.5, 0.5, 0.15, 16);
                const coinMat = new THREE.MeshStandardMaterial({
                    color: 0xffd700,
                    roughness: 0.2,
                    metalness: 0.9,
                    emissive: 0xffd700,
                    emissiveIntensity: 0.4
                });
                const coin = new THREE.Mesh(coinGeo, coinMat);
                coin.position.set((Math.random() - 0.5) * 6, 1.5, z + Math.random() * 15);
                coin.rotation.x = Math.PI / 2;
                coin.userData = { collected: false, baseY: coin.position.y };
                scene.add(coin);
                coins.push(coin);
            }

            // ماشین‌های دیگر
            if (Math.random() > 0.8) {
                const carGroup = new THREE.Group();
                const carBodyGeo = new THREE.BoxGeometry(2, 0.8, 3.5);
                const carBodyMat = new THREE.MeshStandardMaterial({
                    color: new THREE.Color().setHSL(Math.random(), 0.8, 0.5),
                    roughness: 0.3,
                    metalness: 0.6
                });
                const carBody = new THREE.Mesh(carBodyGeo, carBodyMat);
                carBody.position.y = 0.8;
                carBody.castShadow = true;
                carGroup.add(carBody);

                const carCabinGeo = new THREE.BoxGeometry(1.8, 0.6, 1.5);
                const carCabin = new THREE.Mesh(carCabinGeo, carBodyMat);
                carCabin.position.set(0, 1.5, 0.3);
                carGroup.add(carCabin);

                for (let wx = -1; wx <= 1; wx += 2) {
                    const cwGeo = new THREE.CylinderGeometry(0.4, 0.4, 0.3, 16);
                    const cw = new THREE.Mesh(cwGeo, new THREE.MeshStandardMaterial({ color: 0x111111,
                        roughness: 0.8 }));
                    cw.rotation.z = Math.PI / 2;
                    cw.position.set(wx * 1.1, 0.4, 1.2);
                    carGroup.add(cw);
                    const cw2 = cw.clone();
                    cw2.position.z = -1.2;
                    carGroup.add(cw2);
                }

                const lane = Math.random() > 0.5 ? 2.5 : -2.5;
                carGroup.position.set(lane, 0, z + Math.random() * 20);
                carGroup.userData = { speed: 0.3 + Math.random() * 0.5, lane: lane };
                scene.add(carGroup);
                otherCars.push(carGroup);
            }
        }

        // ==================== ذرات ====================
        function createExhaustParticle() {
            const geo = new THREE.SphereGeometry(0.08, 4, 4);
            const mat = new THREE.MeshBasicMaterial({ color: 0x888888, transparent: true, opacity: 0.6 });
            const particle = new THREE.Mesh(geo, mat);
            particle.position.copy(truck.position);
            particle.position.y += 0.8;
            particle.position.z -= 2.5;
            particle.userData = { life: 1, velY: 0.02, velZ: -0.1 };
            scene.add(particle);
            particles.push(particle);
        }

        // ==================== حلقه بازی ====================
        function animate() {
            requestAnimationFrame(animate);

            const delta = clock.getDelta();
            time += delta;

            if (gameRunning) {
                updateGame(delta);
            }

            updateCamera();
            updateMinimap();
            renderer.render(scene, camera);
        }

        function updateGame(delta) {
            // کنترل سرعت
            if (keys['w'] || keys['arrowup']) speed = Math.min(speed + 0.8, maxSpeed);
            else if (keys['s'] || keys['arrowdown']) speed = Math.max(speed - 1.5, 0);
            else speed = Math.max(speed - 0.3, 0);

            // کنترل فرمان
            if (keys['a'] || keys['arrowleft']) steerAngle = Math.max(steerAngle - 0.05, -0.5);
            else if (keys['d'] || keys['arrowright']) steerAngle = Math.min(steerAngle + 0.05, 0.5);
            else steerAngle *= 0.9;

            // حرکت کامیون
            const moveZ = speed * delta * 0.15;
            truck.position.z += moveZ * Math.cos(roadCurve);
            truck.position.x += moveZ * Math.sin(roadCurve) + steerAngle * speed * delta * 0.02;
            truck.rotation.y = roadCurve + steerAngle * 0.3;

            // حرکت تریلر
            const trailerTarget = new THREE.Vector3(
                truck.position.x - Math.sin(truck.rotation.y) * 7,
                truck.position.y,
                truck.position.z - Math.cos(truck.rotation.y) * 7
            );
            trailer.position.lerp(trailerTarget, 0.1);
            trailer.rotation.y = THREE.MathUtils.lerp(trailer.rotation.y, truck.rotation.y, 0.08);

            // چرخش چرخ‌ها
            wheels.forEach(w => {
                w.mesh.rotation.x += speed * delta * 0.2;
                if (w.isFront) w.mesh.rotation.y = steerAngle;
            });
            trailerWheels.forEach(w => {
                w.rotation.x += speed * delta * 0.2;
            });

            // انحنای جاده
            roadCurve += (Math.sin(time * 0.3) * 0.002 - roadCurve) * 0.01;

            // مسافت و امتیاز
            distance += speed * delta;
            score = Math.floor(distance * 0.1) + coinCount * 100;

            // اگزوز
            if (speed > 50 && Math.random() > 0.5) createExhaustParticle();

            // بروزرسانی ذرات
            particles.forEach((p, i) => {
                p.userData.life -= delta * 2;
                p.material.opacity = p.userData.life * 0.6;
                p.position.y += p.userData.velY;
                p.position.z += p.userData.velZ;
                if (p.userData.life <= 0) {
                    scene.remove(p);
                    particles.splice(i, 1);
                }
            });

            // مدیریت جاده
            roadPieces.forEach(r => {
                if (r.z - truck.position.z < -30) {
                    r.z += 2000;
                    r.mesh.position.z = r.z;
                }
            });

            // مدیریت محیط
            [...trees, ...buildings].forEach(obj => {
                if (obj.position.z - truck.position.z < -30) {
                    obj.position.z += 750;
                }
            });

            // جمع‌آوری سکه
            coins.forEach(coin => {
                coin.rotation.z += delta * 3;
                coin.position.y = coin.userData.baseY + Math.sin(time * 5 + coin.position.x) * 0.3;
                if (!coin.userData.collected) {
                    const dist = truck.position.distanceTo(coin.position);
                    if (dist < 3) {
                        coin.userData.collected = true;
                        coinCount++;
                        coin.visible = false;
                        showNotification('🪙 +1 سکه!');
                    }
                }
            });

            // ماشین‌های دیگر
            otherCars.forEach(car => {
                car.position.z -= car.userData.speed * delta * 8;
                if (car.position.z - truck.position.z < -30) car.position.z += 400 + Math.random() * 200;
                const dist = truck.position.distanceTo(car.position);
                if (dist < 2.5 && speed > 0) {
                    damage += delta * 20;
                    speed *= 0.8;
                    showNotification('💥 برخورد!');
                    if (damage >= 100) gameOver();
                }
            });

            // بروزرسانی UI
            updateUI();
        }

        function handbrake() {
            if (gameRunning) {
                speed = Math.max(speed - 40, 0);
                showNotification('🛑 ترمز دستی!');
            }
        }

        function updateUI() {
            document.getElementById('speedValue').textContent = Math.floor(speed);
            document.getElementById('speedFill').style.width = (speed / maxSpeed * 100) + '%';
            document.getElementById('distance').innerHTML = Math.floor(distance) +
                '<span style="font-size:18px;">m</span>';
            document.getElementById('score').textContent = score;
            document.getElementById('coins').textContent = coinCount;
            document.getElementById('damage').textContent = Math.floor(damage) + '%';

            if (damage > 70) document.getElementById('damage').classList.add('danger');
        }

        function updateCamera() {
            const targetPos = truck.position.clone();
            const camOffset = new THREE.Vector3(
                -Math.sin(truck.rotation.y) * 10,
                6,
                -Math.cos(truck.rotation.y) * 14
            );
            const desiredPos = targetPos.clone().add(camOffset);
            camera.position.lerp(desiredPos, 0.05);
            camera.lookAt(
                targetPos.x,
                targetPos.y + 3,
                targetPos.z + 5
            );
        }

        function updateMinimap() {
            minimapCtx.clearRect(0, 0, 180, 180);
            minimapCtx.fillStyle = '#111';
            minimapCtx.fillRect(0, 0, 180, 180);

            // جاده
            minimapCtx.strokeStyle = '#444';
            minimapCtx.lineWidth = 12;
            minimapCtx.beginPath();
            minimapCtx.moveTo(90, 0);
            minimapCtx.lineTo(90, 180);
            minimapCtx.stroke();

            // خط کشی
            minimapCtx.strokeStyle = '#888';
            minimapCtx.lineWidth = 1;
            minimapCtx.setLineDash([5, 10]);
            minimapCtx.beginPath();
            minimapCtx.moveTo(90, 0);
            minimapCtx.lineTo(90, 180);
            minimapCtx.stroke();
            minimapCtx.setLineDash([]);

            // کامیون
            minimapCtx.fillStyle = '#00ff88';
            minimapCtx.fillRect(85, 80, 10, 20);

            // سکه‌ها
            coins.forEach(coin => {
                if (!coin.userData.collected) {
                    const relX = (coin.position.x - truck.position.x) * 3 + 90;
                    const relZ = (coin.position.z - truck.position.z) * 2 + 90;
                    if (relX > 0 && relX < 180 && relZ > 0 && relZ < 180) {
                        minimapCtx.fillStyle = '#ffd700';
                        minimapCtx.beginPath();
                        minimapCtx.arc(relX, relZ, 3, 0, Math.PI * 2);
                        minimapCtx.fill();
                    }
                }
            });

            // ماشین‌های دیگر
            minimapCtx.fillStyle = '#ff4444';
            otherCars.forEach(car => {
                const relX = (car.position.x - truck.position.x) * 3 + 90;
                const relZ = (car.position.z - truck.position.z) * 2 + 90;
                if (relX > 0 && relX < 180 && relZ > 0 && relZ < 180) {
                    minimapCtx.fillRect(relX - 2, relZ - 4, 5, 8);
                }
            });
        }

        function showNotification(msg) {
            const notif = document.getElementById('notification');
            notif.textContent = msg;
            notif.classList.remove('show');
            void notif.offsetWidth;
            notif.classList.add('show');
        }

        function gameOver() {
            gameRunning = false;
            document.getElementById('gameOverScreen').style.display = 'flex';
            document.getElementById('finalScore').textContent = 'امتیاز نهایی: ' + score;
            document.getElementById('controls-hint').style.display = 'none';
            document.body.style.cursor = 'default';
        }

        function startGame() {
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('gameOverScreen').style.display = 'none';
            document.getElementById('controls-hint').style.display = 'flex';
            document.body.style.cursor = 'none';
            gameRunning = true;
            speed = 0;
            distance = 0;
            score = 0;
            coinCount = 0;
            damage = 0;
            truck.position.set(0, 0, 0);
            truck.rotation.set(0, 0, 0);
            trailer.position.set(0, 0, -7);
            trailer.rotation.set(0, 0, 0);
            coins.forEach(c => { c.userData.collected = false;
                c.visible = true; });
        }

        function restartGame() {
            startGame();
        }

        function onResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // شروع
        init();
        console.log('🚛 کامیون‌سواری سه‌بعدی آماده است!');
        console.log('🎮 WASD یا Arrow Keys برای حرکت');
        console.log('🪙 سکه‌ها رو جمع کن');
        console.log('💥 با ماشین‌ها تصادف نکن');
    </script>
</body>
</html>
