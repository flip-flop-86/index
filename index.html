<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>اولین سایت من</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Tahoma,sans-serif;
}

body{
    background:linear-gradient(135deg,#0f172a,#1e293b);
    color:white;
    text-align:center;
}

header{
    padding:80px 20px;
}

h1{
    font-size:55px;
    margin-bottom:20px;
}

p{
    font-size:22px;
    color:#ddd;
}

button{
    margin-top:40px;
    padding:15px 40px;
    border:none;
    border-radius:10px;
    background:#00c853;
    color:white;
    font-size:20px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:scale(1.08);
    background:#00e676;
}

section{
    margin:60px auto;
    width:90%;
    max-width:900px;
}

.card{
    background:#ffffff15;
    backdrop-filter:blur(10px);
    padding:30px;
    border-radius:20px;
    margin:20px 0;
}

footer{
    margin-top:70px;
    padding:25px;
    background:#00000040;
}
</style>

</head>

<body>

<header>
    <h1>🚀 به چاتی پاتی خوش امدید</h1>
    <p>این سایت تنها با HTML و CSS ساخته شده است.</p>

    <button onclick="showMessage()">
        کلیک کن
    </button>
</header>

<section>

<div class="card">
<h2>درباره سایت</h2>
<p>
این صفحه نمونه برای انتشار روی GitHub Pages، Netlify یا هر هاست دیگری مناسب است.
</p>
</div>

<div class="card">
<h2>ویژگی‌ها</h2>

<p>✔ طراحی مدرن</p>
<p>✔ واکنش‌گرا (Responsive)</p>
<p>✔ بدون نیاز به کتابخانه</p>
<p>✔ قابل اجرا روی هر مرورگر</p>

</div>

</section>

<footer>
ساخته شده با ❤️ توسط امیرعلی
</footer>

<script>

function showMessage(){
    alert("تبریک! سایت شما با موفقیت اجرا شد.");
}

</script>

</body>
</html>
