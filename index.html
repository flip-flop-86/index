<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>هوش مصنوعی من</title>

<style>
body{
    font-family:tahoma;
    background:#222;
    color:white;
    margin:20px;
}

textarea{
    width:100%;
    height:120px;
    font-size:18px;
}

button{
    margin-top:10px;
    padding:10px 20px;
    font-size:18px;
}

#answer{
    margin-top:20px;
    background:#333;
    padding:15px;
    border-radius:10px;
    white-space:pre-wrap;
}
</style>

</head>
<body>

<h2>🤖 چت با هوش مصنوعی</h2>

<textarea id="prompt" placeholder="پیام خود را بنویس..."></textarea>

<br>

<button onclick="send()">ارسال</button>

<div id="answer"></div>

<script>

const API_KEY = "sk-pRM85PXbYEP0cTzE1EksDHk6BSn0E";

// مثلا:
// const MODEL = "gpt-4o-mini";
// یا هر مدلی که سایتت گفته است.
const MODEL = "MODEL_NAME";

async function send(){

const prompt = document.getElementById("prompt").value;

document.getElementById("answer").innerHTML="در حال دریافت پاسخ...";

try{

const response = await fetch(
"https://api.apifree.ai/v1/chat/completions",
{
method:"POST",

headers:{
"Authorization":"Bearer "+API_KEY,
"Content-Type":"application/json"
},

body:JSON.stringify({

model:MODEL,

messages:[
{
role:"user",
content:prompt
}
]

})

});

const data = await response.json();

console.log(data);

document.getElementById("answer").innerHTML =
data.choices[0].message.content;

}catch(error){

document.getElementById("answer").innerHTML =
"❌ خطا در اتصال یا API";

console.log(error);

}

}

</script>

</body>
</html>
