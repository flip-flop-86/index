<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شبیه‌ساز تکامل | Evolution Simulator</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --panel: #1a1a2e;
            --accent: #00ff88;
            --accent2: #ff6b6b;
            --gold: #ffd700;
            --text: #e0e0e0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Tahoma, sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            user-select: none;
        }

        #canvas-container {
            flex: 1;
            position: relative;
            background: #0d1117;
            cursor: crosshair;
        }

        canvas {
            display: block;
        }

        #panel {
            width: 340px;
            background: var(--panel);
            border-left: 1px solid #2a2a4a;
            display: flex;
            flex-direction: column;
            padding: 20px;
            gap: 15px;
            overflow-y: auto;
            z-index: 10;
        }

        #panel h1 {
            font-size: 24px;
            text-align: center;
            background: linear-gradient(135deg, var(--accent), #00ccff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }

        .subtitle {
            text-align: center;
            font-size: 11px;
            color: #666;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .stat-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .stat-box {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 14px;
            text-align: center;
            transition: all 0.3s;
        }

        .stat-box:hover {
            border-color: var(--accent);
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.1);
        }

        .stat-value {
            font-size: 28px;
            font-weight: 900;
            color: var(--accent);
        }

        .stat-label {
            font-size: 10px;
            color: #888;
            letter-spacing: 1px;
            margin-top: 4px;
        }

        .chart-container {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 12px;
            padding: 15px;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .chart-title {
            font-size: 13px;
            margin-bottom: 10px;
            color: #aaa;
        }

        #populationChart {
            width: 100%;
            height: 100px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
        }

        .btn {
            padding: 12px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 700;
            font-size: 14px;
            transition: all 0.3s;
            font-family: inherit;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background: var(--accent);
            color: #000;
        }

        .btn-primary:hover {
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.4);
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .btn-danger {
            background: var(--accent2);
            color: #fff;
        }

        .btn-row {
            display: flex;
            gap: 8px;
        }

        .btn-row .btn {
            flex: 1;
        }

        .legend {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            font-size: 10px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 5px;
            background: rgba(255, 255, 255, 0.03);
            padding: 5px 10px;
            border-radius: 20px;
        }

        .legend-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: #777;
        }

        .best-dna {
            background: rgba(255, 215, 0, 0.05);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 10px;
            padding: 12px;
            font-size: 10px;
        }

        .best-dna .title {
            color: var(--gold);
            font-weight: 700;
            margin-bottom: 5px;
            font-size: 12px;
        }

        .dna-bar {
            display: flex;
            gap: 3px;
            margin: 3px 0;
        }

        .dna-gene {
            height: 8px;
            flex: 1;
            border-radius: 2px;
            min-width: 6px;
        }

        .speed-control {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .speed-control input {
            flex: 1;
            accent-color: var(--accent);
        }

        .speed-label {
            font-size: 12px;
            color: #aaa;
            min-width: 60px;
        }

        #tooltip {
            position: absolute;
            pointer-events: none;
            background: rgba(0, 0, 0, 0.9);
            color: #fff;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 11px;
            display: none;
            z-index: 100;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        @media (max-width: 768px) {
            body {
                flex-direction: column;
            }
            #panel {
                width: 100%;
                max-height: 45vh;
                flex-shrink: 0;
            }
            #canvas-container {
                flex: 1;
                min-height: 55vh;
            }
        }
    </style>
</head>
<body>
    <div id="canvas-container">
        <canvas id="canvas"></canvas>
        <div id="tooltip"></div>
    </div>

    <div id="panel">
        <h1>🧬 شبیه‌ساز تکامل</h1>
        <div class="subtitle">EVOLUTION SIMULATOR</div>

        <div class="stat-grid">
            <div class="stat-box">
                <div class="stat-value" id="population">0</div>
                <div class="stat-label">👥 جمعیت</div>
            </div>
            <div class="stat-box">
                <div class="stat-value" id="generation">0</div>
                <div class="stat-label">🧬 نسل</div>
            </div>
            <div class="stat-box">
                <div class="stat-value" id="avgSpeed">0</div>
                <div class="stat-label">⚡ میانگین سرعت</div>
            </div>
            <div class="stat-box">
                <div class="stat-value" id="avgSize">0</div>
                <div class="stat-label">📏 میانگین اندازه</div>
            </div>
        </div>

        <div class="chart-container">
            <div class="chart-title">📈 نمودار جمعیت</div>
            <canvas id="populationChart" width="280" height="100"></canvas>
        </div>

        <div class="legend">
            <div class="legend-item"><div class="legend-dot" style="background:#ff6b6b;"></div> سرعت بالا</div>
            <div class="legend-item"><div class="legend-dot" style="background:#4ecdc4;"></div> سرعت متوسط</div>
            <div class="legend-item"><div class="legend-dot" style="background:#45b7d1;"></div> سرعت پایین</div>
            <div class="legend-item"><div class="legend-dot" style="background:#f9ca24;"></div> اندازه بزرگ</div>
        </div>

        <div class="best-dna">
            <div class="title">🏆 بهترین DNA نسل فعلی</div>
            <div id="bestDnaInfo">در حال تکامل...</div>
        </div>

        <div class="speed-control">
            <span class="speed-label">⏱️ سرعت: <span id="speedDisplay">1x</span></span>
            <input type="range" id="speedSlider" min="1" max="10" value="3" oninput="updateSpeed(this.value)">
        </div>

        <div class="info-row">
            <span>🍎 غذا: <b id="foodCount">0</b></span>
            <span>☠️ مرگ: <b id="deathCount">0</b></span>
        </div>

        <div class="btn-row">
            <button class="btn btn-primary" onclick="togglePause()" id="pauseBtn">⏸️ توقف</button>
            <button class="btn btn-secondary" onclick="addFood(20)">🍎 غذای بیشتر</button>
        </div>
        <div class="btn-row">
            <button class="btn btn-secondary" onclick="addRandomCreatures(10)">➕ موجود جدید</button>
            <button class="btn btn-danger" onclick="resetSimulation()">🔄 شروع مجدد</button>
        </div>
    </div>

    <script>
        // ==================== متغیرها ====================
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const chartCanvas = document.getElementById('populationChart');
        const chartCtx = chartCanvas.getContext('2d');
        const tooltip = document.getElementById('tooltip');

        let creatures = [];
        let foods = [];
        let generation = 1;
        let deaths = 0;
        let populationHistory = [];
        let simulationSpeed = 3;
        let paused = false;
        let mouseX = 0,
            mouseY = 0;
        let frameCount = 0;
        let generationTimer = 0;
        const GENERATION_LENGTH = 600; // frames per generation

        // ==================== کلاس موجود ====================
        class Creature {
            constructor(x, y, dna = null) {
                this.x = x || Math.random() * canvas.width;
                this.y = y || Math.random() * canvas.height;
                this.vx = (Math.random() - 0.5) * 2;
                this.vy = (Math.random() - 0.5) * 2;
                this.energy = 100;
                this.age = 0;
                this.alive = true;
                this.foodEaten = 0;
                this.id = Math.random();

                if (dna) {
                    // وراثت با جهش
                    this.speed = Math.max(0.5, Math.min(5, dna.speed + (Math.random() - 0.5) * 0.8));
                    this.size = Math.max(3, Math.min(15, dna.size + (Math.random() - 0.5) * 2));
                    this.senseRange = Math.max(20, Math.min(150, dna.senseRange + (Math.random() - 0.5) * 20));
                    this.colorHue = Math.max(0, Math.min(360, dna.colorHue + (Math.random() - 0.5) * 30));
                    this.metabolism = Math.max(0.02, Math.min(0.2, dna.metabolism + (Math.random() - 0.5) * 0.03));
                } else {
                    this.speed = 1 + Math.random() * 3;
                    this.size = 4 + Math.random() * 8;
                    this.senseRange = 30 + Math.random() * 80;
                    this.colorHue = Math.random() * 360;
                    this.metabolism = 0.03 + Math.random() * 0.1;
                }
            }

            update(foods, creatures) {
                if (!this.alive) return;

                this.age++;
                this.energy -= this.metabolism;

                // گرسنگی
                if (this.energy <= 0) {
                    this.die();
                    return;
                }

                // پیدا کردن نزدیک‌ترین غذا
                let closestFood = null;
                let closestDist = this.senseRange;

                for (let food of foods) {
                    if (!food.alive) continue;
                    const dx = food.x - this.x;
                    const dy = food.y - this.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < closestDist) {
                        closestDist = dist;
                        closestFood = food;
                    }
                }

                // حرکت به سمت غذا یا حرکت تصادفی
                if (closestFood) {
                    const dx = closestFood.x - this.x;
                    const dy = closestFood.y - this.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    this.vx += (dx / dist) * 0.3;
                    this.vy += (dy / dist) * 0.3;

                    // خوردن غذا
                    if (dist < this.size + 3) {
                        closestFood.alive = false;
                        this.energy = Math.min(150, this.energy + 40);
                        this.foodEaten++;
                    }
                } else {
                    this.vx += (Math.random() - 0.5) * 0.5;
                    this.vy += (Math.random() - 0.5) * 0.5;
                }

                // محدود کردن سرعت
                const currentSpeed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
                if (currentSpeed > this.speed) {
                    this.vx = (this.vx / currentSpeed) * this.speed;
                    this.vy = (this.vy / currentSpeed) * this.speed;
                }

                // حرکت
                this.x += this.vx;
                this.y += this.vy;

                // برخورد به دیوارها
                if (this.x < this.size) { this.x = this.size;
                    this.vx *= -0.5; }
                if (this.x > canvas.width - this.size) { this.x = canvas.width - this.size;
                    this.vx *= -0.5; }
                if (this.y < this.size) { this.y = this.size;
                    this.vy *= -0.5; }
                if (this.y > canvas.height - this.size) { this.y = canvas.height - this.size;
                    this.vy *= -0.5; }

                // اصطکاک
                this.vx *= 0.98;
                this.vy *= 0.98;

                // تولید مثل
                if (this.energy > 80 && this.age > 60 && Math.random() < 0.005) {
                    this.reproduce();
                }
            }

            reproduce() {
                this.energy -= 40;
                const child = new Creature(
                    this.x + (Math.random() - 0.5) * 20,
                    this.y + (Math.random() - 0.5) * 20,
                    this.getDNA()
                );
                creatures.push(child);
            }

            getDNA() {
                return {
                    speed: this.speed,
                    size: this.size,
                    senseRange: this.senseRange,
                    colorHue: this.colorHue,
                    metabolism: this.metabolism
                };
            }

            die() {
                this.alive = false;
                deaths++;
                // تبدیل به غذا
                if (Math.random() > 0.5) {
                    foods.push({
                        x: this.x,
                        y: this.y,
                        alive: true,
                        energy: Math.floor(this.size * 2),
                        isCorpse: true
                    });
                }
            }

            draw(ctx) {
                if (!this.alive) return;

                // بدن
                const gradient = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size);
                const alpha = Math.min(1, this.energy / 100);

                if (this.speed > 3.5) {
                    gradient.addColorStop(0, `hsla(${this.colorHue}, 80%, 65%, ${alpha})`);
                    gradient.addColorStop(1, `hsla(${this.colorHue}, 90%, 35%, ${alpha * 0.7})`);
                } else if (this.speed > 2) {
                    gradient.addColorStop(0, `hsla(${this.colorHue}, 70%, 60%, ${alpha})`);
                    gradient.addColorStop(1, `hsla(${this.colorHue}, 80%, 40%, ${alpha * 0.7})`);
                } else {
                    gradient.addColorStop(0, `hsla(${this.colorHue}, 60%, 55%, ${alpha})`);
                    gradient.addColorStop(1, `hsla(${this.colorHue}, 70%, 30%, ${alpha * 0.7})`);
                }

                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();
                ctx.strokeStyle = `hsla(${this.colorHue}, 80%, 80%, ${alpha * 0.5})`;
                ctx.lineWidth = 1;
                ctx.stroke();

                // چشم‌ها (نشان‌دهنده جهت)
                const angle = Math.atan2(this.vy, this.vx);
                const eyeX = this.x + Math.cos(angle) * this.size * 0.5;
                const eyeY = this.y + Math.sin(angle) * this.size * 0.5;
                ctx.beginPath();
                ctx.arc(eyeX, eyeY, this.size * 0.25, 0, Math.PI * 2);
                ctx.fillStyle = 'white';
                ctx.fill();
                ctx.beginPath();
                ctx.arc(eyeX + Math.cos(angle) * 1, eyeY + Math.sin(angle) * 1, this.size * 0.12, 0, Math.PI * 2);
                ctx.fillStyle = '#111';
                ctx.fill();

                // حلقه حسگر
                if (mouseX && Math.abs(mouseX - this.x) < this.senseRange && Math.abs(mouseY - this.y) < this
                    .senseRange) {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.senseRange, 0, Math.PI * 2);
                    ctx.strokeStyle = `hsla(${this.colorHue}, 60%, 70%, 0.2)`;
                    ctx.lineWidth = 1;
                    ctx.setLineDash([5, 5]);
                    ctx.stroke();
                    ctx.setLineDash([]);
                }
            }
        }

        // ==================== غذا ====================
        function addFood(count) {
            for (let i = 0; i < count; i++) {
                foods.push({
                    x: Math.random() * (canvas.width - 40) + 20,
                    y: Math.random() * (canvas.height - 40) + 20,
                    alive: true,
                    energy: 30,
                    isCorpse: false,
                    pulse: Math.random() * Math.PI * 2
                });
            }
        }

        function drawFood(ctx) {
            for (let food of foods) {
                if (!food.alive) continue;
                const pulse = Math.sin(frameCount * 0.05 + food.pulse) * 2;
                const size = food.isCorpse ? 4 : 5 + pulse;

                ctx.beginPath();
                ctx.arc(food.x, food.y, size, 0, Math.PI * 2);
                const color = food.isCorpse ? '#8B4513' : '#ff6b6b';
                ctx.fillStyle = color;
                ctx.fill();
                ctx.strokeStyle = food.isCorpse ? '#5a2d0c' : '#ff4444';
                ctx.lineWidth = 1;
                ctx.stroke();

                if (!food.isCorpse) {
                    ctx.fillStyle = '#ffaaaa';
                    ctx.beginPath();
                    ctx.arc(food.x - size * 0.3, food.y - size * 0.3, size * 0.3, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
        }

        function addRandomCreatures(count) {
            for (let i = 0; i < count; i++) {
                creatures.push(new Creature(
                    Math.random() * canvas.width,
                    Math.random() * canvas.height
                ));
            }
        }

        // ==================== شبیه‌سازی ====================
        function update() {
            if (paused) return;

            for (let i = 0; i < simulationSpeed; i++) {
                frameCount++;
                generationTimer++;

                // نسل جدید
                if (generationTimer >= GENERATION_LENGTH) {
                    generationTimer = 0;
                    generation++;
                    // انتخاب طبیعی: موجوداتی که غذا نخوردن حذف میشن
                    creatures = creatures.filter(c => c.alive && c.foodEaten > 0 || c.age < 300);
                    creatures.forEach(c => { c.foodEaten = 0;
                        c.energy = Math.min(100, c.energy + 20); });

                    // اضافه کردن غذای جدید
                    if (foods.filter(f => f.alive).length < 30) {
                        addFood(15);
                    }
                }

                // بروزرسانی موجودات
                for (let creature of creatures) {
                    if (creature.alive) creature.update(foods, creatures);
                }

                // حذف مرده‌ها و غذای خورده شده
                creatures = creatures.filter(c => c.alive);
                foods = foods.filter(f => f.alive);

                // غذای تصادفی
                if (foods.length < 40 && Math.random() < 0.02) {
                    addFood(1);
                }

                // ثبت تاریخچه
                if (frameCount % 30 === 0) {
                    populationHistory.push(creatures.length);
                    if (populationHistory.length > 100) populationHistory.shift();
                }
            }
        }

        function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // پس‌زمینه
            ctx.fillStyle = '#0d1117';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // شبکه
            ctx.strokeStyle = 'rgba(255,255,255,0.02)';
            ctx.lineWidth = 0.5;
            const gridSize = 50;
            for (let x = gridSize; x < canvas.width; x += gridSize) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, canvas.height);
                ctx.stroke();
            }
            for (let y = gridSize; y < canvas.height; y += gridSize) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(canvas.width, y);
                ctx.stroke();
            }

            // غذاها
            drawFood(ctx);

            // موجودات
            for (let creature of creatures) {
                creature.draw(ctx);
            }

            // اطلاعات نسل
            ctx.fillStyle = 'rgba(255,255,255,0.6)';
            ctx.font = '14px "Segoe UI", Tahoma, sans-serif';
            ctx.fillText(`نسل ${generation}`, 15, 25);
            ctx.fillText(`موجودات: ${creatures.length}`, 15, 45);
        }

        function updateUI() {
            document.getElementById('population').textContent = creatures.length;
            document.getElementById('generation').textContent = generation;
            document.getElementById('foodCount').textContent = foods.filter(f => f.alive).length;
            document.getElementById('deathCount').textContent = deaths;

            // میانگین‌ها
            if (creatures.length > 0) {
                const avgSpeed = creatures.reduce((s, c) => s + c.speed, 0) / creatures.length;
                const avgSize = creatures.reduce((s, c) => s + c.size, 0) / creatures.length;
                document.getElementById('avgSpeed').textContent = avgSpeed.toFixed(1);
                document.getElementById('avgSize').textContent = avgSize.toFixed(1);

                // بهترین DNA
                const best = creatures.reduce((a, b) => b.foodEaten > a.foodEaten ? b : a, creatures[0]);
                document.getElementById('bestDnaInfo').innerHTML = `
                    ⚡ سرعت: <b>${best.speed.toFixed(1)}</b> | 
                    📏 اندازه: <b>${best.size.toFixed(1)}</b><br>
                    👁️ حسگر: <b>${best.senseRange.toFixed(0)}</b> | 
                    🔥 متابولیسم: <b>${best.metabolism.toFixed(3)}</b><br>
                    🍎 خورده: <b>${best.foodEaten}</b> | 
                    ⏳ سن: <b>${best.age}</b>
                `;
            }

            // نمودار
            drawChart();
        }

        function drawChart() {
            const w = chartCanvas.width;
            const h = chartCanvas.height;
            chartCtx.clearRect(0, 0, w, h);
            chartCtx.fillStyle = 'rgba(0,0,0,0.3)';
            chartCtx.fillRect(0, 0, w, h);

            if (populationHistory.length < 2) return;

            const maxVal = Math.max(...populationHistory, 10);
            const stepX = w / (populationHistory.length - 1);

            // گرادیان
            const gradient = chartCtx.createLinearGradient(0, 0, 0, h);
            gradient.addColorStop(0, 'rgba(0,255,136,0.4)');
            gradient.addColorStop(1, 'rgba(0,255,136,0)');

            chartCtx.beginPath();
            chartCtx.moveTo(0, h);
            for (let i = 0; i < populationHistory.length; i++) {
                const x = i * stepX;
                const y = h - (populationHistory[i] / maxVal) * h;
                chartCtx.lineTo(x, y);
            }
            chartCtx.lineTo(w, h);
            chartCtx.closePath();
            chartCtx.fillStyle = gradient;
            chartCtx.fill();

            // خط
            chartCtx.beginPath();
            for (let i = 0; i < populationHistory.length; i++) {
                const x = i * stepX;
                const y = h - (populationHistory[i] / maxVal) * h;
                if (i === 0) chartCtx.moveTo(x, y);
                else chartCtx.lineTo(x, y);
            }
            chartCtx.strokeStyle = '#00ff88';
            chartCtx.lineWidth = 2;
            chartCtx.stroke();

            // خط میانگین
            const avg = populationHistory.reduce((a, b) => a + b, 0) / populationHistory.length;
            const avgY = h - (avg / maxVal) * h;
            chartCtx.setLineDash([5, 5]);
            chartCtx.strokeStyle = 'rgba(255,255,255,0.4)';
            chartCtx.lineWidth = 1;
            chartCtx.beginPath();
            chartCtx.moveTo(0, avgY);
            chartCtx.lineTo(w, avgY);
            chartCtx.stroke();
            chartCtx.setLineDash([]);
        }

        function togglePause() {
            paused = !paused;
            document.getElementById('pauseBtn').textContent = paused ? '▶️ ادامه' : '⏸️ توقف';
        }

        function updateSpeed(val) {
            simulationSpeed = parseInt(val);
            document.getElementById('speedDisplay').textContent = val + 'x';
        }

        function resetSimulation() {
            creatures = [];
            foods = [];
            generation = 1;
            deaths = 0;
            populationHistory = [];
            frameCount = 0;
            generationTimer = 0;
            addRandomCreatures(30);
            addFood(50);
        }

        // ==================== رویدادها ====================
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            mouseX = e.clientX - rect.left;
            mouseY = e.clientY - rect.top;

            // نمایش tooltip برای موجود نزدیک
            let closest = null;
            let closestDist = 50;
            for (let c of creatures) {
                const dx = c.x - mouseX;
                const dy = c.y - mouseY;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < closestDist && dist < c.size + 20) {
                    closestDist = dist;
                    closest = c;
                }
            }

            if (closest) {
                tooltip.style.display = 'block';
                tooltip.style.left = (e.clientX - rect.left + 20) + 'px';
                tooltip.style.top = (e.clientY - rect.top - 40) + 'px';
                tooltip.innerHTML = `
                    ⚡سرعت: ${closest.speed.toFixed(1)} | 
                    📏اندازه: ${closest.size.toFixed(1)}<br>
                    👁️حسگر: ${closest.senseRange.toFixed(0)} | 
                    🔋انرژی: ${closest.energy.toFixed(0)}
                `;
            } else {
                tooltip.style.display = 'none';
            }
        });

        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            // اضافه کردن غذا با کلیک
            foods.push({
                x: x,
                y: y,
                alive: true,
                energy: 30,
                isCorpse: false,
                pulse: Math.random() * Math.PI * 2
            });
        });

        window.addEventListener('resize', () => {
            resizeCanvas();
        });

        function resizeCanvas() {
            const container = document.getElementById('canvas-container');
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
        }

        // ==================== حلقه اصلی ====================
        function gameLoop() {
            update();
            render();
            updateUI();
            requestAnimationFrame(gameLoop);
        }

        // ==================== شروع ====================
        function init() {
            resizeCanvas();
            addRandomCreatures(25);
            addFood(40);
            gameLoop();
        }

        init();
        console.log('🧬 شبیه‌ساز تکامل آماده است!');
        console.log('👆 روی صفحه کلیک کن تا غذا اضافه بشه');
        console.log('🖱️ موس رو روی موجودات ببر تا اطلاعاتشون رو ببینی');
    </script>
</body>
</html>
