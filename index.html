```html
<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galaxy Portal</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Tahoma,sans-serif;
}

body{
overflow:hidden;
background:#020617;
color:white;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

.container{
text-align:center;
animation:fade 1.5s;
}

h1{
font-size:70px;
text-shadow:0 0 20px cyan;
margin-bottom:15px;
}

p{
font-size:22px;
opacity:.9;
margin-bottom:40px;
}

button{
padding:18px 45px;
font-size:22px;
border:none;
border-radius:50px;
cursor:pointer;
background:linear-gradient(45deg,#00e5ff,#651fff);
color:white;
transition:.3s;
box-shadow:0 0 20px cyan;
}

button:hover{
transform:scale(1.15) rotate(-2deg);
box-shadow:0 0 50px cyan;
}

#secret{
margin-top:35px;
font-size:28px;
display:none;
animation:pop .5s;
}

@keyframes pop{
from{transform:scale(0);}
to{transform:scale(1);}
}

@keyframes fade{
from{opacity:0;transform:translateY(40px);}
to{opacity:1;transform:translateY(0);}
}

.floating{
position:absolute;
font-size:35px;
animation:fly linear infinite;
user-select:none;
}

@keyframes fly{
from{
transform:translateY(120vh) rotate(0deg);
}
to{
transform:translateY(-120vh) rotate(360deg);
}
}

</style>

</head>

<body>

<canvas id="space"></canvas>

<div class="container">

<h1>🚀 Galaxy Portal</h1>

<p>
به دنیای عجیب اینترنت خوش اومدی!
</p>

<button onclick="magic()">
✨ دکمه مرموز ✨
</button>

<div id="secret"></div>

</div>

<script>

const canvas=document.getElementById("space");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

const stars=[];

for(let i=0;i<250;i++){
stars.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*2,
v:Math.random()*2+0.5
});
}

function draw(){

ctx.fillStyle="#020617";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="white";

for(let s of stars){

ctx.beginPath();
ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
ctx.fill();

s.y+=s.v;

if(s.y>canvas.height){
s.y=0;
s.x=Math.random()*canvas.width;
}

}

requestAnimationFrame(draw);

}

draw();

const emojis=["🚀","👽","🌍","🛰️","⭐","☄️","🛸","🌙","💫","⚡"];

setInterval(()=>{

let e=document.createElement("div");

e.className="floating";
e.innerHTML=emojis[Math.floor(Math.random()*emojis.length)];

e.style.left=Math.random()*100+"vw";
e.style.animationDuration=(4+Math.random()*6)+"s";

document.body.appendChild(e);

setTimeout(()=>e.remove(),10000);

},250);

function magic(){

const msgs=[
"👾 سلام زمینی!",
"🚀 پرتاب موفق بود!",
"🛸 موجودات فضایی تو را دیدند!",
"⭐ امتیاز مخفی پیدا شد!",
"🌌 خوش اومدی به کهکشان!",
"🎉 تو فوق‌العاده‌ای!"
];

document.getElementById("secret").style.display="block";

document.getElementById("secret").innerHTML=
msgs[Math.floor(Math.random()*msgs.length)];

document.body.style.background=
"rgb("+
Math.random()*255+","+
Math.random()*255+","+
Math.random()*255+")";

}

</script>

</body>
</html>
